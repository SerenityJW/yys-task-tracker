<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>任务面板</title>
<meta name="robots" content="noindex, nofollow">
<style>
  :root{
    --bg: #0d1117; --bg-elevated: #151c26; --card: #182130; --card-border: #232d3d; --line: #202a3a;
    --text: #e7edf5; --text-dim: #8592a6; --text-faint: #566175;
    --daily: #4fd8e0; --weekly: #e0a64f; --event: #b48ce0;
    --ok: #6fcf97; --danger: #e0654f; --danger-dim: #4a2b26; --radius: 14px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  html,body{margin:0;padding:0;}
  body{ background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif; min-height: 100vh; padding-bottom: 84px; }
  .mono{ font-family: ui-monospace, "SF Mono", Menlo, Monaco, Consolas, monospace; }

  #loginScreen{ position: fixed; inset:0; z-index: 100; background: var(--bg); display:flex; align-items:center; justify-content:center; padding: 24px; }
  #loginScreen.hidden{ display:none; }
  .login-box{ width:100%; max-width: 340px; }
  .login-box .name{ font-family: ui-monospace, monospace; font-weight:800; font-size: 22px; text-align:center; margin-bottom: 4px; }
  .login-box .sub{ text-align:center; color: var(--text-dim); font-size: 13px; margin-bottom: 28px; }
  .login-box input{ width:100%; background: var(--bg-elevated); border:1px solid var(--card-border); color: var(--text); border-radius: 10px; padding: 13px 14px; font-size:15px; outline:none; margin-bottom: 10px; }
  .login-box input:focus{ border-color: var(--daily); }
  .login-box button{ width:100%; background: var(--daily); color: var(--bg); border:none; border-radius:10px; padding: 13px; font-weight:700; font-size:15px; margin-top: 6px; }
  .login-box button:disabled{ opacity: 0.6; }
  .login-error{ color: var(--danger); font-size: 13px; margin-top: 10px; text-align:center; min-height: 18px; }
  .login-status{ color: var(--text-faint); font-size: 12px; text-align:center; margin-top: 14px; }

  #appRoot{ display:none; } #appRoot.visible{ display:block; }

  header.top{ position: sticky; top:0; z-index: 20; background: linear-gradient(180deg, rgba(13,17,23,0.98), rgba(13,17,23,0.9)); backdrop-filter: blur(10px); padding: 14px 16px 10px; border-bottom: 1px solid var(--line); }
  .brand{ display:flex; align-items:baseline; justify-content:space-between; }
  .brand .name{ font-family: ui-monospace, monospace; font-weight:800; font-size: 17px; }
  .brand .clock{ font-family: ui-monospace, monospace; font-size: 12px; color: var(--text-dim); }
  .storage-note{ font-size: 10px; color: var(--text-faint); margin-top: 4px; display:flex; justify-content:space-between; align-items:center; }
  .storage-note button{ background:none; border:none; color: var(--text-faint); text-decoration: underline; font-size: 10px; padding:0; }
  .sync-dot{ display:inline-block; width:6px; height:6px; border-radius:50%; margin-right:4px; background: var(--text-faint); }
  .sync-dot.online{ background: var(--ok); } .sync-dot.offline{ background: var(--danger); }
  .hud{ margin-top: 10px; display:flex; gap:8px; }
  .hud .seg{ flex:1; background: var(--bg-elevated); border:1px solid var(--card-border); border-radius: 10px; padding: 8px 10px; }
  .hud .seg .lab{ font-size:10px; color: var(--text-faint); text-transform:uppercase; letter-spacing: 0.8px; font-family: ui-monospace, monospace;}
  .hud .seg .val{ font-family: ui-monospace, monospace; font-size:15px; font-weight:700; margin-top:2px; }
  .hud .seg .val.daily{ color: var(--daily); } .hud .seg .val.weekly{ color: var(--weekly); } .hud .seg .val.event{ color: var(--event); }

  main{ padding: 14px 12px 8px; max-width: 640px; margin: 0 auto; }

  .subtabs{ display:flex; gap:6px; margin-bottom: 12px; }
  .subtab{ flex:1; text-align:center; padding:7px; border-radius:8px; background:var(--card); border:1px solid var(--card-border); color:var(--text-dim); font-size:12px; }
  .subtab.active.daily{ border-color: var(--daily); color: var(--daily); }
  .subtab.active.weekly{ border-color: var(--weekly); color: var(--weekly); }
  .subtab.active.event{ border-color: var(--event); color: var(--event); }

  .btn{ appearance:none; border:1px solid var(--card-border); background: var(--bg-elevated); color: var(--text); padding: 8px 12px; border-radius: 10px; font-size: 13px; display:flex; align-items:center; gap:6px; }
  .btn:active{ transform: scale(0.97); }
  .btn.danger{ color: var(--danger); border-color: var(--danger-dim); }
  .btn.primary{ color: var(--bg); background: var(--daily); border-color: var(--daily); font-weight:600; }
  .toolbar{ margin-bottom: 12px; }

  .matrix-wrap{ overflow-x:auto; background: var(--card); border:1px solid var(--card-border); border-radius: var(--radius); }
  table.matrix{ border-collapse: collapse; font-family: ui-monospace, monospace; font-size: 11px; white-space: nowrap; width:100%; }
  table.matrix th, table.matrix td{ padding: 8px 10px; text-align:center; border-top: 1px solid var(--line); }
  table.matrix th{ color: var(--text-faint); font-weight:400; border-top:none; }
  table.matrix .rowlabel{ position: sticky; left:0; background: var(--card); text-align:left; font-family:-apple-system,sans-serif; font-size:13px; color:var(--text); z-index:1; }
  table.matrix .collabel{ min-width: 64px; color: var(--text); font-weight:600; }
  .cadence-tag{ display:block; font-size:9px; margin-top:2px; }
  .cadence-tag.event{ color: var(--event); }
  .cbx{ width:18px; height:18px; border-radius:5px; border:1.5px solid var(--text-faint); display:inline-flex; align-items:center; justify-content:center; cursor:pointer; }
  .cbx.checked.daily{ background: var(--daily); border-color: var(--daily); }
  .cbx.checked.weekly{ background: var(--weekly); border-color: var(--weekly); }
  .cbx.checked.once{ background: var(--event); border-color: var(--event); }
  .cbx svg{ width:12px; height:12px; display:none; } .cbx.checked svg{ display:block; }
  .task-expired-note{ font-size:9px; color: var(--danger); display:block; margin-top:2px; }

  .empty{ text-align:center; padding: 40px 20px; color: var(--text-faint); font-size:14px; }

  nav.tabbar{ position: fixed; bottom:0; left:0; right:0; z-index: 30; background: rgba(21,28,38,0.96); backdrop-filter: blur(14px); border-top: 1px solid var(--line); display:flex; padding: 6px 8px calc(6px + env(safe-area-inset-bottom)); }
  nav.tabbar button{ flex:1; background:none; border:none; color: var(--text-faint); display:flex; flex-direction:column; align-items:center; gap:3px; padding: 6px 0; font-size: 10px; font-family: ui-monospace, monospace; }
  nav.tabbar button.active{ color: var(--daily); } nav.tabbar button svg{ width:20px; height:20px; }

  .panel{ display:none; } .panel.active{ display:block; }
  .section-title{ font-family: ui-monospace, monospace; font-size:12px; color: var(--text-faint); text-transform: uppercase; letter-spacing: 1px; margin: 18px 4px 8px; }
  .section-title:first-child{ margin-top: 4px; }

  table.stats{ width:100%; border-collapse:collapse; font-family: ui-monospace, monospace; font-size:12px; }
  table.stats th{ padding:6px 4px; text-align:right; font-size:9px; text-transform:uppercase; color:var(--text-faint); font-weight:400; }
  table.stats th:first-child{ text-align:left; }
  table.stats td{ padding:9px 4px; text-align:right; border-top:1px solid var(--line); }
  table.stats td:first-child{ text-align:left; font-family:-apple-system,sans-serif; font-size:13px; color:var(--text); }
  .stat-note{ font-size:10px; color: var(--text-faint); margin-top:10px; }

  .accordion{ background: var(--card); border:1px solid var(--card-border); border-radius: var(--radius); margin-bottom:8px; overflow:hidden; }
  .accordion-head{ display:flex; justify-content:space-between; align-items:center; padding: 11px 14px; cursor:pointer; }
  .accordion-head .t{ font-size:13px; font-weight:600; }
  .accordion-head .chev{ color: var(--text-faint); font-size:12px; }
  .accordion-body{ display:none; padding: 0 14px 12px; border-top: 1px solid var(--line); }
  .accordion-body.open{ display:block; }
  .accordion.open .accordion-body{ display:block; }

  .manage-row{ display:flex; align-items:center; gap:6px; padding: 9px 0; border-bottom: 1px solid var(--line); }
  .manage-row:last-of-type{ border-bottom:none; }
  .manage-row .info{ flex:1; min-width:0; }
  .manage-row .info .n{ font-size:13px; }
  .manage-row .info .d{ font-size:10.5px; color: var(--text-faint); font-family: ui-monospace, monospace; margin-top:2px; }
  .manage-row button{ background:none; border:none; color: var(--danger); font-size: 12px; padding:4px 6px; flex-shrink:0; }
  .manage-row .reorder{ display:flex; flex-direction:column; gap:2px; flex-shrink:0; }
  .manage-row .reorder button{ color: var(--text-dim); font-size: 13px; padding:0 6px; line-height:1; }
  .add-row{ display:flex; gap:6px; margin: 10px 0 4px; flex-wrap:wrap; }
  .add-row input[type="text"]{ flex:1; min-width: 110px; }
  .add-row input, .add-row select{ background: var(--bg-elevated); border:1px solid var(--card-border); color: var(--text); border-radius: 8px; padding: 8px 10px; font-size:13px; outline:none; }
  .add-row input[type="date"]{ width: 132px; } .add-row select{ width: 90px; }
  .add-row button{ background: var(--daily); color: var(--bg); border:none; border-radius:8px; padding: 0 14px; font-weight:700; font-size:13px; }

  .backup-box{ background: var(--card); border:1px solid var(--card-border); border-radius: var(--radius); padding: 14px; margin-bottom: 12px; }
  .backup-box p{ font-size:12px; color: var(--text-dim); margin: 0 0 10px; line-height:1.6; }
  .backup-box .row{ display:flex; gap:8px; flex-wrap: wrap; }
  .account-name-inline{ font-size:13px; color: var(--text-dim); word-break: break-all; }

  .log-item{ padding: 8px 0; border-bottom: 1px solid var(--line); font-size:12px; }
  .log-item:last-child{ border-bottom:none; }
  .log-item .t{ color: var(--text-faint); font-family: ui-monospace, monospace; font-size:10px; }
  .log-item .m{ color: var(--text); margin-top:2px; }
  .log-item .e{ color: var(--text-faint); font-size:10px; }

  .toast{ position: fixed; bottom: 90px; left:50%; transform: translateX(-50%); background: var(--bg-elevated); border:1px solid var(--card-border); color: var(--text); padding: 9px 16px; border-radius: 20px; font-size:13px; z-index: 50; opacity:0; pointer-events:none; transition: opacity .2s ease, transform .2s ease; max-width: 90%; text-align:center; }
  .toast.show{ opacity:1; transform: translateX(-50%) translateY(-6px); }

  .confirm-overlay{ position: fixed; inset:0; background: rgba(0,0,0,0.55); z-index: 60; display:none; align-items:flex-end; justify-content:center; }
  .confirm-overlay.show{ display:flex; }
  .confirm-box{ background: var(--bg-elevated); border:1px solid var(--card-border); border-radius: 16px 16px 0 0; padding: 20px 18px calc(20px + env(safe-area-inset-bottom)); width:100%; max-width: 640px; }
  .confirm-box p{ margin: 0 0 16px; font-size:14px; color: var(--text-dim); line-height:1.5; }
  .confirm-actions{ display:flex; flex-direction:column; gap:8px; }
  .confirm-actions .row2{ display:flex; gap:10px; }
  .confirm-actions button{ padding: 12px; border-radius:10px; border:none; font-size:14px; font-weight:600; }
  .confirm-actions .row2 button{ flex:1; }
  .confirm-actions .cancel{ background: var(--card); color: var(--text); border:1px solid var(--card-border); }
  .confirm-actions .ok{ background: var(--danger); color: #fff; }
  .confirm-actions .backup{ background: var(--daily); color: var(--bg); display:none; }
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-box">
    <div class="name">⚡ 任务面板</div>
    <div class="sub">登录后可在任意设备同步你的打卡数据</div>
    <input type="email" id="loginEmail" placeholder="邮箱" autocomplete="username">
    <input type="password" id="loginPassword" placeholder="密码" autocomplete="current-password">
    <button id="loginBtn">登录</button>
    <div class="login-error" id="loginError"></div>
    <div class="login-status">账号数据互相独立</div>
  </div>
</div>

<div id="appRoot">
<header class="top">
  <div class="brand">
    <div class="name">⚡ 任务面板</div>
    <div class="clock mono" id="clock">--</div>
  </div>
  <div class="storage-note">
    <span><span class="sync-dot" id="syncDot"></span><span id="syncText">同步中…</span></span>
    <button id="logoutBtn">退出登录</button>
  </div>
  <div class="hud">
    <div class="seg"><div class="lab">今日·每日</div><div class="val daily" id="hudDaily">0/0</div></div>
    <div class="seg"><div class="lab">本周·每周</div><div class="val weekly" id="hudWeekly">0/0</div></div>
    <div class="seg"><div class="lab">版本活动</div><div class="val event" id="hudEvent">0/0</div></div>
  </div>
</header>

<main>
  <div class="panel active" id="panel-tasks">
    <div class="subtabs">
      <div class="subtab active daily" data-kind="daily">每日</div>
      <div class="subtab weekly" data-kind="weekly">每周</div>
      <div class="subtab event" data-kind="event">版本活动</div>
    </div>
    <div class="toolbar">
      <button class="btn danger" id="clearCurrentBtn">一键清空当前分类</button>
    </div>
    <div id="matrixWrap"></div>
  </div>

  <div class="panel" id="panel-stats">
    <div id="statsWrap"></div>
  </div>

  <div class="panel" id="panel-manage">
    <div class="section-title">当前登录邮箱</div>
    <div class="backup-box"><p style="margin:0;"><span class="account-name-inline" id="currentEmail">-</span></p></div>

    <div class="section-title">账号（▲▼ 排序，任务页同步）</div>
    <div id="manageAccounts"></div>
    <div class="add-row">
      <input type="text" id="newAccountInput" placeholder="新账号名称，例如：小号3">
      <button id="addAccountBtn">添加</button>
    </div>

    <div class="section-title">任务</div>
    <div class="accordion" id="accDaily">
      <div class="accordion-head"><div class="t">每日任务</div><div class="chev">›</div></div>
      <div class="accordion-body">
        <div id="manageDaily"></div>
        <div class="add-row">
          <input type="text" id="newDailyInput" placeholder="新每日任务，例如：日常签到">
          <button id="addDailyBtn">添加</button>
        </div>
      </div>
    </div>
    <div class="accordion" id="accWeekly">
      <div class="accordion-head"><div class="t">每周任务</div><div class="chev">›</div></div>
      <div class="accordion-body">
        <div id="manageWeekly"></div>
        <div class="add-row">
          <input type="text" id="newWeeklyInput" placeholder="新每周任务，例如：周本首领">
          <button id="addWeeklyBtn">添加</button>
        </div>
      </div>
    </div>
    <div class="accordion" id="accEvent">
      <div class="accordion-head"><div class="t">版本活动</div><div class="chev">›</div></div>
      <div class="accordion-body">
        <div id="manageEvent"></div>
        <div class="add-row">
          <input type="text" id="newEventInput" placeholder="活动名称">
          <select id="newEventCadence"><option value="once">once</option><option value="daily">每日</option><option value="weekly">每周</option></select>
          <input type="date" id="newEventDate">
          <button id="addEventBtn">添加</button>
        </div>
      </div>
    </div>
    <div class="accordion" id="accLog">
      <div class="accordion-head"><div class="t">变更记录（7天内）</div><div class="chev">›</div></div>
      <div class="accordion-body"><div id="logList"></div></div>
    </div>

    <div class="section-title">备份与分享</div>
    <div class="backup-box">
      <p>含账号、任务、打卡状态，用于恢复数据。</p>
      <div class="row">
        <button class="btn primary" id="exportBtn">导出完整备份</button>
        <button class="btn" id="importBtn">导入完整备份</button>
        <input type="file" id="importFile" accept="application/json" style="display:none">
      </div>
    </div>
    <div class="backup-box">
      <p>只含任务定义，不含账号和打卡状态，可发给朋友导入。</p>
      <div class="row">
        <button class="btn" id="exportTemplateBtn">导出任务模板</button>
        <button class="btn" id="importTemplateBtn">导入任务模板</button>
        <input type="file" id="importTemplateFile" accept="application/json" style="display:none">
      </div>
    </div>
  </div>
</main>
</div>

<nav class="tabbar">
  <button class="tab-btn active" data-panel="panel-tasks">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
    任务
  </button>
  <button class="tab-btn" data-panel="panel-stats">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="M7 15l4-5 3 3 5-7"/></svg>
    统计
  </button>
  <button class="tab-btn" data-panel="panel-manage">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.6 1.6 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.6 1.6 0 0 0-1.8-.3 1.6 1.6 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.6 1.6 0 0 0-1-1.5 1.6 1.6 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.6 1.6 0 0 0 .3-1.8 1.6 1.6 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.6 1.6 0 0 0 1.5-1 1.6 1.6 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.6 1.6 0 0 0 1.8.3H9a1.6 1.6 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.6 1.6 0 0 0 1 1.5 1.6 1.6 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.6 1.6 0 0 0-.3 1.8V9a1.6 1.6 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.6 1.6 0 0 0-1.5 1z"/></svg>
    管理
  </button>
</nav>

<div class="toast" id="toast"></div>

<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <p id="confirmText">确定要执行此操作吗？</p>
    <div class="confirm-actions">
      <button class="backup" id="confirmBackup">先导出备份</button>
      <div class="row2">
        <button class="cancel" id="confirmCancel">取消</button>
        <button class="ok" id="confirmOk">确定</button>
      </div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";
import {
  initializeFirestore, persistentLocalCache, getFirestore, doc, getDoc, setDoc,
  collection, addDoc, getDocs, query, orderBy, deleteDoc, writeBatch
} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBaVl7CWdc3fs8lwIqKmaCddHjpDCiJYuk",
  authDomain: "yys-task-tracker.firebaseapp.com",
  projectId: "yys-task-tracker",
  storageBucket: "yys-task-tracker.firebasestorage.app",
  messagingSenderId: "863077565171",
  appId: "1:863077565171:web:f6dea4b49cd740d80bad86"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
let db;
try{ db = initializeFirestore(app, { localCache: persistentLocalCache() }); }
catch(e){ db = getFirestore(app); }

const CHECK_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
const LOG_RETENTION_MS = 7*24*60*60*1000;
const LOG_MAX_COUNT = 300;

let currentUser = null;
let config = null, state = null;
let activeKind = 'daily';
let openSections = new Set();

function uid(){ return Math.random().toString(36).slice(2,9); }
function bjTimeStr(d){ d=d||new Date(); return new Intl.DateTimeFormat('zh-CN',{timeZone:'Asia/Shanghai',hour:'2-digit',minute:'2-digit',hour12:false}).format(d); }
function bjDateStr(d){ d=d||new Date(); return new Intl.DateTimeFormat('en-CA',{timeZone:'Asia/Shanghai',year:'numeric',month:'2-digit',day:'2-digit'}).format(d); }
function bjFullStr(d){ d=d||new Date(); return bjDateStr(d)+' '+new Intl.DateTimeFormat('zh-CN',{timeZone:'Asia/Shanghai',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false}).format(d); }
function bjMondayStr(dateStr){
  const [y,m,d] = dateStr.split('-').map(Number);
  const dt = new Date(Date.UTC(y,m-1,d));
  const dow = dt.getUTCDay();
  const diff = (dow===0? -6 : 1-dow);
  dt.setUTCDate(dt.getUTCDate()+diff);
  return dt.toISOString().slice(0,10);
}
function daysUntil(endDateStr){
  if(!endDateStr) return null;
  const todayStr = bjDateStr();
  const [ty,tm,td] = todayStr.split('-').map(Number);
  const [ey,em,ed] = endDateStr.split('-').map(Number);
  return Math.round((Date.UTC(ey,em-1,ed) - Date.UTC(ty,tm-1,td)) / 86400000);
}
function cadenceLabel(c){ return c==='daily'?'每日':c==='weekly'?'每周':'once'; }

function defaultConfig(){
  return {
    accounts: [ {id: uid(), name: '示例账号A'}, {id: uid(), name: '示例账号B'} ],
    tasks: [
      {id: uid(), name: '每日签到', cadence:'daily', endDate:null},
      {id: uid(), name: '体力副本', cadence:'daily', endDate:null},
      {id: uid(), name: '周本首领', cadence:'weekly', endDate:null}
    ]
  };
}
function defaultState(){ return { checks: {}, lastDailyReset: null, lastWeeklyReset: null }; }

function migrateConfig(c){
  if(!c.tasks){
    c.tasks = [];
    (c.dailyTasks||[]).forEach(t=> c.tasks.push({id:t.id,name:t.name,cadence:'daily',endDate:null}));
    (c.weeklyTasks||[]).forEach(t=> c.tasks.push({id:t.id,name:t.name,cadence:'weekly',endDate:null}));
    (c.eventTasks||[]).forEach(t=> c.tasks.push({id:t.id,name:t.name,cadence:'once',endDate:t.endDate||null}));
    delete c.dailyTasks; delete c.weeklyTasks; delete c.eventTasks;
  }
  return c;
}
function migrateState(s){
  Object.keys(s.checks||{}).forEach(accId=>{
    const cval = s.checks[accId];
    if(cval && (cval.daily || cval.weekly || cval.event)){
      s.checks[accId] = Object.assign({}, cval.daily||{}, cval.weekly||{}, cval.event||{});
    }
  });
  if(s.lastDailyReset===undefined) s.lastDailyReset = null;
  if(s.lastWeeklyReset===undefined) s.lastWeeklyReset = null;
  return s;
}
function ensureAccountChecks(accId){ if(!state.checks[accId]) state.checks[accId] = {}; }

function isDaily(t){ return !t.endDate && t.cadence==='daily'; }
function isWeekly(t){ return !t.endDate && t.cadence==='weekly'; }
function isEvent(t){ return !!t.endDate; }
function dailyTasks(){ return config.tasks.filter(isDaily); }
function weeklyTasks(){ return config.tasks.filter(isWeekly); }
function eventTasks(){ return config.tasks.filter(isEvent); }

function configDocRef(){ return doc(db, 'users', currentUser.uid, 'config', 'main'); }
function stateDocRef(){ return doc(db, 'users', currentUser.uid, 'state', 'main'); }
function logsCol(){ return collection(db, 'users', currentUser.uid, 'logs'); }

async function loadAll(){
  setSyncStatus('syncing');
  try{
    const cSnap = await getDoc(configDocRef());
    config = cSnap.exists() ? migrateConfig(cSnap.data()) : defaultConfig();
    if(!cSnap.exists()) await setDoc(configDocRef(), config);

    const sSnap = await getDoc(stateDocRef());
    state = sSnap.exists() ? migrateState(sSnap.data()) : defaultState();
    if(!sSnap.exists()) await setDoc(stateDocRef(), state);

    config.accounts.forEach(a=> ensureAccountChecks(a.id));
    setSyncStatus('online');
  }catch(e){
    console.error(e);
    config = config || defaultConfig(); state = state || defaultState();
    config.accounts.forEach(a=> ensureAccountChecks(a.id));
    setSyncStatus('offline');
  }
  await runResetCheck();
}
async function saveConfig(){ try{ await setDoc(configDocRef(), config); setSyncStatus('online'); }catch(e){ setSyncStatus('offline'); showToast('已保存到本地，联网后自动同步'); } }
async function saveState(){ try{ await setDoc(stateDocRef(), state); setSyncStatus('online'); }catch(e){ setSyncStatus('offline'); showToast('已保存到本地，联网后自动同步'); } }
function setSyncStatus(s){
  const dot=document.getElementById('syncDot'), text=document.getElementById('syncText');
  if(!dot) return;
  dot.className='sync-dot '+(s==='online'?'online':s==='offline'?'offline':'');
  text.textContent = s==='online'?'已同步':s==='offline'?'离线（联网后自动同步）':'同步中…';
}

async function runResetCheck(){
  const today = bjDateStr();
  const monday = bjMondayStr(today);
  let changed = false;
  if(state.lastDailyReset !== today){
    const ids = dailyTasks().map(t=>t.id).concat(eventTasks().filter(t=>t.cadence==='daily').map(t=>t.id));
    Object.keys(state.checks).forEach(accId=>{ ids.forEach(tid=> delete state.checks[accId][tid]); });
    state.lastDailyReset = today; changed = true;
  }
  if(state.lastWeeklyReset !== monday){
    const ids = weeklyTasks().map(t=>t.id).concat(eventTasks().filter(t=>t.cadence==='weekly').map(t=>t.id));
    Object.keys(state.checks).forEach(accId=>{ ids.forEach(tid=> delete state.checks[accId][tid]); });
    state.lastWeeklyReset = monday; changed = true;
  }
  if(changed) await saveState();
}

function showToast(msg){
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(t._timer); t._timer=setTimeout(()=>t.classList.remove('show'),2200);
}
let confirmResolve=null;
function confirmDialog(text,opts){
  opts=opts||{};
  document.getElementById('confirmText').textContent=text;
  document.getElementById('confirmBackup').style.display=opts.showBackup?'block':'none';
  document.getElementById('confirmOverlay').classList.add('show');
  return new Promise(res=>{ confirmResolve=res; });
}
document.getElementById('confirmCancel').onclick=()=>{ document.getElementById('confirmOverlay').classList.remove('show'); if(confirmResolve) confirmResolve(false); };
document.getElementById('confirmOk').onclick=()=>{ document.getElementById('confirmOverlay').classList.remove('show'); if(confirmResolve) confirmResolve(true); };
document.getElementById('confirmBackup').onclick=()=>{ exportBackup(); };
function escapeHtml(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

function renderClock(){ document.getElementById('clock').textContent = bjTimeStr()+' 北京时间'; }

function renderHud(){
  const dt=dailyTasks(), wt=weeklyTasks(), et=eventTasks();
  let dD=0,wD=0,eD=0;
  config.accounts.forEach(acc=>{
    ensureAccountChecks(acc.id);
    dt.forEach(t=>{ if(state.checks[acc.id][t.id]) dD++; });
    wt.forEach(t=>{ if(state.checks[acc.id][t.id]) wD++; });
    et.forEach(t=>{ if(state.checks[acc.id][t.id]) eD++; });
  });
  document.getElementById('hudDaily').textContent = dD+'/'+(dt.length*config.accounts.length);
  document.getElementById('hudWeekly').textContent = wD+'/'+(wt.length*config.accounts.length);
  document.getElementById('hudEvent').textContent = eD+'/'+(et.length*config.accounts.length);
}

function renderMatrix(){
  const wrap = document.getElementById('matrixWrap');
  const kind = activeKind;
  const tasks = kind==='daily'?dailyTasks(): kind==='weekly'?weeklyTasks(): eventTasks();
  if(config.accounts.length===0){ wrap.innerHTML='<div class="empty">还没有账号</div>'; return; }
  if(tasks.length===0){ wrap.innerHTML='<div class="empty">还没有任务</div>'; return; }
  let html = '<div class="matrix-wrap"><table class="matrix"><tr><th class="rowlabel">任务</th>';
  config.accounts.forEach(acc=>{
    html += '<th class="collabel">'+escapeHtml(acc.name)+'</th>';
  });
  html += '</tr>';
  tasks.forEach(t=>{
    let tag = '';
    if(kind==='event') tag = '<span class="cadence-tag event">'+cadenceLabel(t.cadence)+'</span>';
    let expiredNote = '';
    if(kind==='event' && t.endDate){
      const dLeft = daysUntil(t.endDate);
      if(dLeft!==null && dLeft<0) expiredNote = '<span class="task-expired-note">已结束</span>';
    }
    html += '<tr><td class="rowlabel">'+escapeHtml(t.name)+tag+expiredNote+'</td>';
    const safeCadence = ['daily','weekly','once'].includes(t.cadence) ? t.cadence : 'once';
    config.accounts.forEach(acc=>{
      ensureAccountChecks(acc.id);
      const checked = !!state.checks[acc.id][t.id];
      html += '<td><div class="cbx '+safeCadence+' '+(checked?'checked':'')+'" data-acc="'+acc.id+'" data-task="'+t.id+'">'+CHECK_SVG+'</div></td>';
    });
    html += '</tr>';
  });
  html += '</table></div>';
  wrap.innerHTML = html;
  wrap.querySelectorAll('.cbx').forEach(el=>{
    el.addEventListener('click', ()=> toggleCheck(el.dataset.acc, el.dataset.task));
  });
}
async function toggleCheck(accId, taskId){
  ensureAccountChecks(accId);
  state.checks[accId][taskId] = !state.checks[accId][taskId];
  renderMatrix(); renderHud();
  await saveState();
}

function renderStats(){
  const wrap = document.getElementById('statsWrap');
  const dt=dailyTasks(), wt=weeklyTasks(), et=eventTasks();
  if(config.accounts.length===0){ wrap.innerHTML='<div class="empty">暂无账号数据</div>'; return; }
  let html = '<table class="stats"><tr><th>账号</th><th style="color:var(--daily)">每日</th><th style="color:var(--weekly)">每周</th><th style="color:var(--event)">活动</th></tr>';
  config.accounts.forEach(acc=>{
    ensureAccountChecks(acc.id);
    const dD = dt.filter(t=>state.checks[acc.id][t.id]).length;
    const wD = wt.filter(t=>state.checks[acc.id][t.id]).length;
    const eD = et.filter(t=>state.checks[acc.id][t.id]).length;
    const cell = (done,total,color)=>{
      if(total===0) return '<td style="color:var(--text-faint)">—</td>';
      const c = done===total ? color : 'var(--text-faint)';
      return '<td style="color:'+c+'">'+done+'/'+total+'</td>';
    };
    html += '<tr><td>'+escapeHtml(acc.name)+'</td>'+
      cell(dD,dt.length,'var(--daily)')+
      cell(wD,wt.length,'var(--weekly)')+
      cell(eD,et.length,'var(--event)')+
      '</tr>';
  });
  html += '</table><div class="stat-note">完成显示彩色，未完成灰色，无任务显示 —</div>';
  wrap.innerHTML = html;
}

function renderManageAccounts(){
  const wrap = document.getElementById('manageAccounts');
  wrap.innerHTML='';
  config.accounts.forEach((a,idx)=>{
    const row=document.createElement('div'); row.className='manage-row';
    row.innerHTML =
      '<div class="reorder"><button data-dir="-1" '+(idx===0?'style="opacity:.3"':'')+'>▲</button><button data-dir="1" '+(idx===config.accounts.length-1?'style="opacity:.3"':'')+'>▼</button></div>'+
      '<div class="info"><div class="n">'+escapeHtml(a.name)+'</div></div><button class="del">删除</button>';
    row.querySelectorAll('.reorder button').forEach(b=> b.onclick=()=>moveAccount(a.id,parseInt(b.dataset.dir)));
    row.querySelector('.del').onclick=()=>removeAccount(a.id);
    wrap.appendChild(row);
  });
}
function renderManageTaskList(containerId, list, kindLabel, listName){
  const wrap = document.getElementById(containerId);
  wrap.innerHTML='';
  list.forEach(t=>{
    const row=document.createElement('div'); row.className='manage-row';
    let dInfo = '';
    if(listName==='event'){
      const dLeft = daysUntil(t.endDate);
      const dText = dLeft===null?'':dLeft<0?'已结束':dLeft===0?'今天截止':'还剩'+dLeft+'天';
      dInfo = '<div class="d">周期：'+cadenceLabel(t.cadence)+' · 截止 '+escapeHtml(t.endDate||'-')+' · '+dText+'</div>';
    }
    row.innerHTML = '<div class="info"><div class="n">'+escapeHtml(t.name)+'</div>'+dInfo+'</div><button class="del">删除</button>';
    row.querySelector('.del').onclick=()=>removeTask(t.id);
    wrap.appendChild(row);
  });
}
function renderManage(){
  document.getElementById('currentEmail').textContent = currentUser? currentUser.email : '-';
  renderManageAccounts();
  renderManageTaskList('manageDaily', dailyTasks(), '每日', 'daily');
  renderManageTaskList('manageWeekly', weeklyTasks(), '每周', 'weekly');
  renderManageTaskList('manageEvent', eventTasks(), '版本活动', 'event');
  renderLogs();
}

function renderAll(){ renderHud(); renderMatrix(); renderStats(); renderManage(); }

// ---------- mutations ----------
async function addAccount(name){
  const acc={id:uid(),name}; config.accounts.push(acc); ensureAccountChecks(acc.id);
  renderAll(); await saveConfig(); await saveState();
  await addLog('新增账号「'+name+'」');
}
async function moveAccount(id,dir){
  const idx=config.accounts.findIndex(a=>a.id===id); const n=idx+dir;
  if(n<0||n>=config.accounts.length) return;
  const tmp=config.accounts[idx]; config.accounts[idx]=config.accounts[n]; config.accounts[n]=tmp;
  renderAll(); await saveConfig();
}
async function removeAccount(id){
  const acc=config.accounts.find(a=>a.id===id);
  const ok=await confirmDialog('删除账号「'+(acc?acc.name:'')+'」？打卡记录也会一并清除。',{showBackup:true});
  if(!ok) return;
  config.accounts=config.accounts.filter(a=>a.id!==id); delete state.checks[id];
  renderAll(); await saveConfig(); await saveState();
  await addLog('删除账号「'+(acc?acc.name:id)+'」');
}
async function addPlainTask(name,cadence){
  config.tasks.push({id:uid(),name,cadence,endDate:null});
  renderAll(); await saveConfig();
  await addLog('新增'+(cadence==='daily'?'每日':'每周')+'任务「'+name+'」');
}
async function addEventTaskFn(name,cadence,endDate){
  config.tasks.push({id:uid(),name,cadence,endDate: endDate||null});
  renderAll(); await saveConfig();
  await addLog('新增版本活动「'+name+'」（周期：'+cadenceLabel(cadence)+'，截止：'+(endDate||'未设置')+'）');
}
async function removeTask(id){
  const t=config.tasks.find(x=>x.id===id); if(!t) return;
  const label = isEvent(t)?'版本活动': isDaily(t)?'每日':'每周';
  const ok=await confirmDialog('删除'+label+'任务「'+t.name+'」？所有账号的打卡记录也会清除。',{showBackup:true});
  if(!ok) return;
  config.tasks=config.tasks.filter(x=>x.id!==id);
  Object.keys(state.checks).forEach(accId=> delete state.checks[accId][id]);
  renderAll(); await saveConfig(); await saveState();
  await addLog('删除'+label+'任务「'+t.name+'」');
}
async function clearCurrentCategory(){
  const kind=activeKind;
  const tasks = kind==='daily'?dailyTasks(): kind==='weekly'?weeklyTasks(): eventTasks();
  const label = kind==='daily'?'每日': kind==='weekly'?'每周':'版本活动';
  const ok=await confirmDialog('清空所有账号的「'+label+'」打卡状态？建议先导出备份。',{showBackup:true});
  if(!ok) return;
  const ids = tasks.map(t=>t.id);
  Object.keys(state.checks).forEach(accId=> ids.forEach(tid=> delete state.checks[accId][tid]));
  renderAll(); await saveState();
  showToast('已清空'+label);
}

// ---------- backup / template ----------
function exportBackup(){
  const payload={config,state,exportedAt:bjFullStr(),version:5};
  downloadJson(payload,'任务面板备份-'+bjDateStr()+'.json');
  showToast('已导出备份');
}
async function importBackupFile(file){
  const text=await file.text(); let payload;
  try{ payload=JSON.parse(text); }catch(e){ showToast('文件格式不正确'); return; }
  if(!payload.config||!payload.state){ showToast('备份文件内容不完整'); return; }
  const ok=await confirmDialog('导入将覆盖当前所有数据（账号、任务、打卡状态），确定导入？',{showBackup:false});
  if(!ok) return;
  config=migrateConfig(payload.config); state=migrateState(payload.state);
  config.accounts.forEach(a=>ensureAccountChecks(a.id));
  renderAll(); await saveConfig(); await saveState();
  await addLog('导入完整备份，覆盖全部数据');
  showToast('导入成功');
}
function exportTemplate(){
  const payload={tasks:config.tasks,exportedAt:bjFullStr(),version:1,type:'task-template'};
  downloadJson(payload,'任务清单模板-'+bjDateStr()+'.json');
  showToast('已导出任务模板');
}
async function importTemplateFile(file){
  const text=await file.text(); let payload;
  try{ payload=JSON.parse(text); }catch(e){ showToast('文件格式不正确'); return; }
  if(!payload.tasks || !Array.isArray(payload.tasks)){ showToast('模板文件内容不完整'); return; }
  const ok=await confirmDialog('追加这 '+payload.tasks.length+' 项任务到你的列表？不影响现有账号和打卡状态。',{showBackup:false});
  if(!ok) return;
  payload.tasks.forEach(t=>{
    const safeCadence = ['daily','weekly','once'].includes(t.cadence) ? t.cadence : 'daily';
    config.tasks.push({id:uid(), name:String(t.name||'').slice(0,60), cadence:safeCadence, endDate:t.endDate||null});
  });
  renderAll(); await saveConfig();
  await addLog('导入任务清单模板，新增 '+payload.tasks.length+' 项任务');
  showToast('导入成功');
}
function downloadJson(payload,filename){
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ---------- logs ----------
async function addLog(action){
  if(!currentUser) return;
  try{
    await addDoc(logsCol(), { ts: bjFullStr(), ts_ms: Date.now(), email: currentUser.email, action });
  }catch(e){ console.error(e); }
  await pruneAndRenderLogs();
}
async function pruneAndRenderLogs(){
  if(!currentUser) return;
  try{
    const snap = await getDocs(query(logsCol(), orderBy('ts_ms','desc')));
    const docs = snap.docs;
    const cutoff = Date.now() - LOG_RETENTION_MS;
    const toDelete = [];
    const toShow = [];
    docs.forEach((d,i)=>{
      const data = d.data();
      if(i>=LOG_MAX_COUNT || data.ts_ms < cutoff){ toDelete.push(d.ref); }
      else if(toShow.length<50){ toShow.push(data); }
    });
    if(toDelete.length){
      const batch = writeBatch(db);
      toDelete.forEach(ref=> batch.delete(ref));
      await batch.commit();
    }
    renderLogsData(toShow);
  }catch(e){ console.error(e); }
}
function renderLogsData(items){
  const wrap=document.getElementById('logList');
  if(!wrap) return;
  if(!items || items.length===0){ wrap.innerHTML='<div class="empty">暂无记录</div>'; return; }
  wrap.innerHTML = items.map(it=>
    '<div class="log-item"><div class="t">'+escapeHtml(it.ts)+' · <span class="e">'+escapeHtml(it.email||'')+'</span></div><div class="m">'+escapeHtml(it.action)+'</div></div>'
  ).join('');
}
function renderLogs(){ pruneAndRenderLogs(); }

document.getElementById('addWeeklyBtn').onclick=()=>{

document.getElementById('addEventBtn').onclick=()=>{

  const ok=await confirmDialog('确定要退出登录吗？',{showBackup:false});
  if(!ok) return; await signOut(auth);
};

document.getElementById('loginBtn').addEventListener('click', doLogin);
document.getElementById('loginPassword').addEventListener('keydown',(e)=>{ if(e.key==='Enter') doLogin(); });
async function doLogin(){
  const email=document.getElementById('loginEmail').value.trim();
  const password=document.getElementById('loginPassword').value;
  const errEl=document.getElementById('loginError'); const btn=document.getElementById('loginBtn');
  errEl.textContent='';
  if(!email||!password){ errEl.textContent='请输入邮箱和密码'; return; }
  btn.disabled=true; btn.textContent='登录中…';
  try{ await signInWithEmailAndPassword(auth,email,password); }
  catch(e){
    let msg='登录失败，请检查邮箱和密码';
    if(e.code==='auth/invalid-credential'||e.code==='auth/wrong-password') msg='邮箱或密码不正确';
    if(e.code==='auth/user-not-found') msg='该邮箱未注册';
    if(e.code==='auth/too-many-requests') msg='尝试次数过多，请稍后再试';
    errEl.textContent=msg;
  }
  btn.disabled=false; btn.textContent='登录';
}
onAuthStateChanged(auth, async(user)=>{
  if(user){
    currentUser=user;
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('appRoot').classList.add('visible');
    await loadAll(); renderClock(); renderAll();
  } else {
    currentUser=null;
    document.getElementById('loginScreen').classList.remove('hidden');
    document.getElementById('appRoot').classList.remove('visible');
  }
});
setInterval(()=>{ if(currentUser) renderClock(); }, 30000);
window.addEventListener('online', ()=>{ if(currentUser) setSyncStatus('online'); });
window.addEventListener('offline', ()=>{ if(currentUser) setSyncStatus('offline'); });
